services:
  - type: web
    name: screenshotter-api
    runtime: node
    plan: free
    buildCommand: cd server && pnpm install && pnpm build
    startCommand: cd server && pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: CHROMIUM_PATH
        scope: run_and_build
